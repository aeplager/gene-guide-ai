---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: gene-guide-api
  labels:
    app: gene-guide-api
    version: v1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "100"
    spec:
      containers:
      - image: {{BACKEND_IMAGE}}:latest
        ports:
        - containerPort: 8081
          name: http1
        env:
        - name: PORT
          value: "8081"
        - name: TAVUS_API_KEY
          valueFrom:
            secretKeyRef:
              name: gene-guide-secrets
              key: tavus-api-key
        - name: TAVUS_REPLICA_ID
          valueFrom:
            secretKeyRef:
              name: gene-guide-secrets
              key: tavus-replica-id
        - name: TAVUS_PERSONA_ID
          valueFrom:
            secretKeyRef:
              name: gene-guide-secrets
              key: tavus-persona-id
        - name: DB_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: gene-guide-secrets
              key: db-connection-string
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: gene-guide-secrets
              key: jwt-secret
        - name: CUSTOM_LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: gene-guide-secrets
              key: custom-llm-api-key
        - name: CUSTOM_LLM_PERSONA_ID
          valueFrom:
            secretKeyRef:
              name: gene-guide-secrets
              key: custom-llm-persona-id
        resources:
          requests:
            cpu: 1
            memory: 512Mi
          limits:
            cpu: 2
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: gene-guide-web
  labels:
    app: gene-guide-web
    version: v1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "100"
    spec:
      containers:
      - image: {{FRONTEND_IMAGE}}:latest
        ports:
        - containerPort: 80
          name: http1
        resources:
          requests:
            cpu: 1
            memory: 256Mi
          limits:
            cpu: 1
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 30
